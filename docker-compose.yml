version: '3.8'

services:
  backend:
    build: ./backend
    container_name: drishyamitra-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///drishyamitra.db
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/drishyamitra.db:/app/drishyamitra.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: drishyamitra-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: drishyamitra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  photos:
  database:
